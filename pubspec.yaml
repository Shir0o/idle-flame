name: flame_game
description: "Idle Flame — auto-RPG dungeon descender."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flame: ^1.37.0
  flame_audio: ^2.12.1
  flutter:
    sdk: flutter
  provider: ^6.1.5
  shared_preferences: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/characters/neon_ronin/
    - assets/images/characters/cyber_grunt/
    - assets/images/characters/cyber_grunt/walk_south/
